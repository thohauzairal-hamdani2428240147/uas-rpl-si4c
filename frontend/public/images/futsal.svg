<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#152010" />
      <stop offset="100%" stop-color="#05070a" />
    </radialGradient>
    
    <!-- Neon Lime Gradient -->
    <linearGradient id="lime-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#79ff5b" />
      <stop offset="100%" stop-color="#00daf3" />
    </linearGradient>

    <!-- Pitch Line Pattern -->
    <pattern id="pitch-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg-glow)" />
  <rect width="800" height="600" fill="url(#pitch-grid)" />

  <!-- Abstract Design Elements -->
  <circle cx="400" cy="300" r="250" fill="none" stroke="rgba(121, 255, 91, 0.05)" stroke-width="2" />
  <circle cx="400" cy="300" r="180" fill="none" stroke="url(#lime-glow)" stroke-width="1" stroke-dasharray="10 15" opacity="0.3" />

  <!-- Futsal Ball / Goal Graphic -->
  <g transform="translate(400, 300)">
    <!-- Goal Net Silhouette -->
    <path d="M -150 -100 L 150 -100 L 200 120 L -200 120 Z" fill="none" stroke="rgba(255, 255, 255, 0.07)" stroke-width="3" />
    <path d="M -100 -100 L -120 120 M 0 -100 L 0 120 M 100 -100 L 120 120" stroke="rgba(255, 255, 255, 0.05)" stroke-width="2" />
    
    <!-- Inner Glow -->
    <circle cx="0" cy="0" r="90" fill="rgba(121, 255, 91, 0.1)" filter="blur(10px)" />
    
    <!-- Soccer/Futsal Ball Silhouette -->
    <circle cx="0" cy="0" r="75" fill="#0c0e12" stroke="url(#lime-glow)" stroke-width="5" />
    
    <!-- Pentagons / Panels -->
    <polygon points="0,-30 -25,-12 -15,18 15,18 25,-12" fill="url(#lime-glow)" opacity="0.8" />
    <path d="M 0,-30 L 0,-75 M -25,-12 L -65,-25 M -15,18 L -45,60 M 15,18 L 45,60 M 25,-12 L 65,-25" stroke="url(#lime-glow)" stroke-width="3" />
    <path d="M -75,0 C -75,-41 -41,-75 0,-75 C 41,-75 75,-41 75,0 C 75,41 41,75 0,75 C -41,75 -75,41 -75,0 Z" fill="none" stroke="url(#lime-glow)" stroke-width="4" />
  </g>

  <!-- Typography Brand -->
  <text x="400" y="520" text-anchor="middle" fill="#79ff5b" font-family="'Plus Jakarta Sans', sans-serif" font-weight="800" font-size="28" letter-spacing="4">FUTSAL ARENA</text>
  <text x="400" y="550" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="'JetBrains Mono', monospace" font-weight="500" font-size="12" letter-spacing="1">PROARENA ELITE CLUB</text>
</svg>
